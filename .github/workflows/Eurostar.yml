name: Generate EUROSTAR M3U8

on:
  workflow_dispatch:
  schedule:
    # alle 30 Minuten, aber nicht auf :00 / :30
    - cron: "7,37 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -e

          BRANCH="${REF:-$DEFAULT_BRANCH}"
          echo "Using branch: $BRANCH"

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.git" repo
          cd repo
          git checkout "$BRANCH"

      - name: Install Python + dependencies
        run: |
          set -e
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run EUROSTAR script
        run: |
          set -e
          cd repo
          mkdir -p output
          python3 src/eurostar.py

      - name: Commit & push if file changed
        run: |
          set -e
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f output/eurostar.m3u8 ]; then
            git add output/eurostar.m3u8

            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update EUROSTAR stream"
              git push origin HEAD
            fi
          else
            echo "No stream file generated → skip commit"
          fi
