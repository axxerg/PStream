name: Update ATV Stream

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python Packages
        run: |
          pip install requests playwright

      - name: Install Chromium
        run: |
          playwright install chromium

      - name: Run ATV Token Script
        run: python atv/atv_token.py

      - name: Create Playlist
        run: |
          echo "#EXTM3U" > atv/stream.m3u
          echo "#EXTINF:-1,ATV Avrupa" >> atv/stream.m3u

          if [ -f atv/stream.txt ]; then
            cat atv/stream.txt >> atv/stream.m3u
          fi

      - name: Commit Files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Update ATV stream" || echo "No changes"

          git pull --rebase origin main

          git push
