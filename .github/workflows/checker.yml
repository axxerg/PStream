name: Check M3U Streams (Python Async)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install aiohttp

      - name: Run Python stream checker
        run: |
          python3 checker/streamcheck.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stream-check-results
          path: checker/

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checker/reachable.txt checker/unreachable.txt
          git commit -m "Update stream check results" || echo "No changes"

          git pull --rebase origin main
          git push origin main
