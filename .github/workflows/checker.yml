name: Check M3U Streams

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Check URLs (Hybrid Stream Validation)
        run: |
          echo "Checking stream URLs..."

          mkdir -p output
          > output/reachable.txt
          > output/unreachable.txt

          last_extinf=""

          while IFS= read -r line || [ -n "$line" ]; do

            # EXTINF speichern
            if [[ "$line" == \#EXTINF* ]]; then
              last_extinf="$line"
              continue
            fi

            # URL erkannt
            if [[ "$line" == http* ]]; then
              url="$line"

              # Wenn kein EXTINF → Dummy
              if [[ -z "$last_extinf" ]]; then
                extinf="#EXTINF:-1 ,TEST"
              else
                extinf="$last_extinf"
              fi

              echo "Testing: $url"

              # 1. HEAD-Check
              if ! curl -Is --max-time 5 "$url" >/dev/null; then
                echo "[FAILED] HEAD: $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/unreachable.txt
                last_extinf=""
                continue
              fi

              # 2. Inhalt abrufen
              content=$(curl -L --max-time 10 -s "$url")

              # 3. Prüfen ob M3U8
              if ! echo "$content" | grep -q "#EXTM3U"; then
                echo "[FAILED] NO M3U8: $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/unreachable.txt
                last_extinf=""
                continue
              fi

              # 4. Prüfen ob Segmente existieren
              if ! echo "$content" | grep -E -q "\.ts|\.m4s|\.aac"; then
                echo "[FAILED] NO SEGMENTS: $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/unreachable.txt
                last_extinf=""
                continue
              fi

              # Wenn alle Checks bestanden → OK
              echo "[OK] $url"
              {
                echo "$extinf"
                echo "$url"
                echo
              } >> output/reachable.txt

              last_extinf=""
            fi

          done < checker/playlist.m3u

      - name: Sort results alphabetically
        run: |
          sort -t',' -k2 output/reachable.txt -o output/reachable.txt
          sort -t',' -k2 output/unreachable.txt -o output/unreachable.txt

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-check-results
          path: output/

      - name: Commit results to repo
        run: |
          cp output/reachable.txt checker/reachable.txt
          cp output/unreachable.txt checker/unreachable.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checker/reachable.txt checker/unreachable.txt
          git commit -m "Update stream check results" || echo "No changes"

          git pull --rebase origin main
          git push origin main
