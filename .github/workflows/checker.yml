name: Check M3U Streams

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check URLs
        run: |
          echo "Checking stream URLs..."

          mkdir -p checker
          > checker/reachable.txt
          > checker/unreachable.txt

          grep -E "^http" checker/playlist.m3u | while read -r url; do
            echo "Testing: $url"
            if curl -Is --max-time 5 "$url" >/dev/null; then
              echo "[OK] $url"
              echo "$url" >> checker/reachable.txt
            else
              echo "[FAILED] $url"
              echo "$url" >> checker/unreachable.txt
            fi
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stream-check-results
          path: checker/
