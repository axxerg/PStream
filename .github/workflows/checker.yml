name: Check M3U Streams (Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install requests

      - name: Run Python stream checker
        run: |
          python3 checker/streamcheck.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stream-check-results
          path: ~/Documents/Test/output.m3u8

      - name: Commit results to repo
        run: |
          cp ~/Documents/Test/output.m3u8 checker/reachable.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checker/reachable.txt
          git commit -m "Update stream check results" || echo "No changes"
          git pull --rebase origin main
          git push origin main
