name: Check M3U Streams

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Check URLs with real stream validation
        run: |
          echo "Checking stream URLs..."

          mkdir -p output
          > output/reachable.txt
          > output/unreachable.txt

          last_extinf=""

          while IFS= read -r line || [ -n "$line" ]; do

            # EXTINF speichern
            if [[ "$line" == \#EXTINF* ]]; then
              last_extinf="$line"
              continue
            fi

            # URL erkannt
            if [[ "$line" == http* ]]; then
              url="$line"

              # Wenn kein EXTINF → Dummy
              if [[ -z "$last_extinf" ]]; then
                extinf="#EXTINF:-1 ,TEST"
              else
                extinf="$last_extinf"
              fi

              echo "Testing: $url"

              # ECHTER STREAM-TEST mit ffprobe
              if ffprobe -v error -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$url" > /dev/null 2>&1; then
                echo "[OK] $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/reachable.txt
              else
                echo "[FAILED] $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/unreachable.txt
              fi

              last_extinf=""
            fi

          done < checker/playlist.m3u

      - name: Sort results alphabetically
        run: |
          sort -t',' -k2 output/reachable.txt -o output/reachable.txt
          sort -t',' -k2 output/unreachable.txt -o output/unreachable.txt

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-check-results
          path: output/

      - name: Commit results to repo
        run: |
          cp output/reachable.txt checker/reachable.txt
          cp output/unreachable.txt checker/unreachable.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checker/reachable.txt checker/unreachable.txt
          git commit -m "Update stream check results" || echo "No changes"

          git pull --rebase origin main
          git push origin main
