      - name: Check URLs
        run: |
          echo "Checking stream URLs..."

          mkdir -p output
          > output/reachable.txt
          > output/unreachable.txt

          last_extinf=""

          while IFS= read -r line || [ -n "$line" ]; do

            # Wenn Zeile mit #EXTINF beginnt → speichern
            if [[ "$line" == \#EXTINF* ]]; then
              last_extinf="$line"
              continue
            fi

            # Wenn Zeile mit http beginnt → Stream testen
            if [[ "$line" == http* ]]; then
              url="$line"

              # Falls kein EXTINF vorhanden → Dummy erzeugen
              if [[ -z "$last_extinf" ]]; then
                extinf="#EXTINF:-1 ,TEST"
              else
                extinf="$last_extinf"
              fi

              echo "Testing: $url"

              if curl -Is --max-time 5 "$url" >/dev/null; then
                echo "[OK] $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/reachable.txt
              else
                echo "[FAILED] $url"
                {
                  echo "$extinf"
                  echo "$url"
                  echo
                } >> output/unreachable.txt
              fi

              # EXTINF zurücksetzen
              last_extinf=""
            fi

          done < checker/playlist.m3u
