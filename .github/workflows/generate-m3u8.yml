name: Generate M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo (manual)
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Install dependencies (manual)
        run: |
          cd repo
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi

      - name: Generate playlists
        run: |
          cd repo
          # Setze Pfad relativ zum geklonten Ordner
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          python3 src/generate.py config/config.json

      - name: Commit & push
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Prüfen ob der Ordner existiert
          if [ -d "output" ]; then
            git add -f output
            git diff --cached --quiet || (git commit -m "Update m3u8 playlists" && git push origin "${{ github.ref_name }}")
          else
            echo "Output folder not found"
          fi
