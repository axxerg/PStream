name: Generate Streams

on:
  schedule:
    - cron: '0 */3 * * *' # Läuft alle 3 Stunden
  workflow_dispatch: # Erlaubt manuelles Starten über das GitHub-Interface

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit der Bot Dateien hochladen darf

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Wir checken das Repo ohne Unterordner aus, um Pfadprobleme zu vermeiden
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip3 install -r requirements.txt
          else
            pip3 install streamlink requests
          fi

      - name: Run generator
        run: |
          # Absolute Pfade setzen, damit Streamlink die lokalen Plugins findet
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          
          # Starte das Generierungs-Skript
          python3 src/generate.py config/config.json

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sicherstellen, dass wir im richtigen Verzeichnis sind
          # Falls der Output-Ordner existiert, füge ihn hinzu
          if [ -d "output" ]; then
            git add -f output/
            
            # Prüfen, ob es tatsächlich Änderungen gibt (vermeidet Fehler bei leerem Commit)
            if ! git diff --cached --quiet; then
              git commit -m "Update m3u8 playlists [skip ci]"
              git push origin main
            else
              echo "Keine Änderungen an den Playlists festgestellt."
            fi
          else
            echo "Fehler: Output-Ordner wurde nicht erstellt!"
            exit 1
          fi
