name: Generate M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Repo sauber auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Python + Cache
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ✅ Dependencies installieren
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install streamlink requests
          fi

      # 🔥 OPTIONAL: Proxy setzen (nur wenn du einen hast)
      # Secrets anlegen: PROXY_URL = http://user:pass@host:port
      - name: Set proxy (optional)
        if: ${{ secrets.PROXY_URL != '' }}
        run: |
          echo "Using proxy"
          export http_proxy=${{ secrets.PROXY_URL }}
          export https_proxy=${{ secrets.PROXY_URL }}

      # ✅ Stream-Generierung
      - name: Generate playlists
        run: |
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src

          python src/generate.py config/config.json

      # ✅ Commit & Push nur bei Änderungen
      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "output" ]; then
            git add -f output/

            if ! git diff --cached --quiet; then
              git commit -m "Update m3u8 playlists"
              git push
            else
              echo "No changes to commit"
            fi
          else
            echo "Output folder not found, skipping."
          fi
