name: Generate M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Nutzt die offizielle Action zum Auschecken (viel stabiler)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python Umgebung einrichten
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Abhängigkeiten installieren
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Generierung starten
      - name: Generate playlists
        run: |
          # Pfad für eigene Streamlink-Plugins setzen
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          python3 src/generate.py config/config.json

      # 5. Änderungen speichern
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Nur adden und pushen, wenn der output Ordner existiert
          if [ -d "output" ]; then
            git add -f output
            git diff --cached --quiet || (git commit -m "Update m3u8 playlists" && git push)
          else
            echo "Kein Output-Ordner gefunden!"
          fi
