name: Generate ATV M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git checkout "${{ github.event.repository.default_branch }}"

      - name: Install Python + dependencies
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          cd repo
          python3 -m pip install -r requirements.txt

      - name: Run ATV script
        run: |
          cd repo
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          python3 src/generate.py config/config.json

      - name: Commit & push if files changed
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ls output/*.m3u8 >/dev/null 2>&1; then
            git add output/*.m3u8
            git diff --cached --quiet || git commit -m "Update ATV streams"
            git push origin HEAD
          else
            echo "No stream files generated → skip commit"
          fi
