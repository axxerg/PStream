name: Generate M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PROXY_URL: ${{ secrets.PROXY_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install streamlink requests
          fi

      # ✅ FIX: jetzt über env prüfen (funktioniert immer)
      - name: Set proxy (optional)
        if: ${{ env.PROXY_URL != '' }}
        run: |
          echo "Using proxy"
          export http_proxy=$PROXY_URL
          export https_proxy=$PROXY_URL

      - name: Generate playlists
        run: |
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src

          python src/generate.py config/config.json

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "output" ]; then
            git add -f output/

            if ! git diff --cached --quiet; then
              git commit -m "Update m3u8 playlists"
              git push
            else
              echo "No changes to commit"
            fi
          else
            echo "Output folder not found, skipping."
