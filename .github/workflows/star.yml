name: Generate EUROSTAR M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Python + dependencies
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run EuroStarTV script
        run: |
          python3 src/eurostar.py

      - name: Commit & push if file changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f output/eurostartv.m3u8 ]; then
            git add output/eurostartv.m3u8
            git diff --cached --quiet || git commit -m "Update StarTV stream"
            git push
          else
            echo "No stream file generated → skip commit"
          fi
