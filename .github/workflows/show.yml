name: Generate M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository manually
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Install Python & dependencies
        run: |
          cd repo
          sudo apt update
          sudo apt install -y python3 python3-pip
          pip3 install --upgrade pip
          pip3 install streamlink requests pyyaml

      - name: Run generator
        run: |
          cd repo
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          python3 ./src/generate.py ./config/config.json

      - name: Commit & push
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output || true

          if ! git diff --cached --quiet; then
            git commit -m "Auto update m3u8 playlists"
            git push origin "${{ github.ref_name }}"
          else
            echo "No changes"
          fi
