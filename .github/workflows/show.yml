name: Generate M3U8 Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

concurrency:
  group: m3u8
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install streamlink requests pyyaml

      - name: Run generator
        run: |
          export STREAMLINK_PLUGIN_DIR=$(pwd)/src/plugins
          python ./src/showturk.py ./config/config.json

      - name: Commit & push playlists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output || true

          if ! git diff --cached --quiet; then
            git commit -m "Auto update IPTV playlists"
            git push
          else
            echo "No changes"
          fi
