name: Generate ShowTurk M3U8

on:
  workflow_dispatch:
  schedule:
    # alle 30 Minuten, aber nicht auf :00 / :30 (zuverlässiger als */30)
    - cron: "7,37 * * * *"
      timezone: "Europe/Berlin"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git checkout "${{ github.event.repository.default_branch }}"

      - name: Install Python + dependencies
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run ShowTurk script
        run: |
          cd repo
          python3 src/showturk.py

      - name: Commit & push if file changed
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f output/showturk.m3u8 ]; then
            git add output/showturk.m3u8

            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update ShowTurk stream"
              git push origin HEAD
            fi
          else
            echo "No stream file generated → skip commit"
          fi
