name: Generate ATV M3U8

on:
  workflow_dispatch:
  schedule:
    # alle 30 Minuten, versetzt für stabilere GitHub-Ausführung
    - cron: "17,47 * * * *"
      timezone: "Europe/Berlin"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git checkout "${{ github.event.repository.default_branch }}"

      - name: Install Python + Playwright
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install chromium

      - name: Run ATV script
        run: |
          cd repo
          python3 src/atv.py

      - name: Commit & push if file changed
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f output/atv.m3u8 ]; then
            git add output/atv.m3u8

            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update ATV stream"
              git push origin HEAD
            fi
          else
            echo "No stream file generated → skip commit"
          fi
